name: 'Build and package library'
description: 'Sets up environment, optionally versions, builds, and packages a target'
inputs:
  target:
    description: 'Target package'
    required: true
  github_token:
    description: 'GitHub token for committing and pushing the version bump'
    required: false

runs:
  using: "composite"
  steps:
    # Safeguard: Clear out any patches, unstaged changes, or leftover tarballs
    - name: Restore Working Tree
      shell: bash
      run: |
        git restore .
        rm -f lib/js/*.tgz || true

    - name: Setup Environment
      uses: ./.github/actions/setup-environment
      with:
        target: ${{ inputs.target }}

    - name: Version and Commit
      working-directory: lib/js
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        npx changeset version
        npm install --package-lock-only
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "chore: version bump [skip ci]" || echo "No changes to commit"

    - name: Build package
      shell: bash
      working-directory: lib/js
      run: npm run build

    - name: Package and Upload
      uses: ./.github/actions/package-tarball
      with:
        target: ${{ inputs.target }}

    - name: Push Version Bump
      working-directory: lib/js
      shell: bash
      run: |
        git pull --rebase origin main
        git push origin main --follow-tags || echo "No changes to push"
