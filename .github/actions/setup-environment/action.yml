name: 'Setup Environment'
description: 'Sets up Node, caches, patches, and installs dependencies'
inputs:
  target:
    description: 'Target package (vonage or opentok)'
    required: true
runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        # Keep in sync with node-version in publish-package/action.yml
        # and the build job in validate-pr.yml
        node-version: 24.x

    # Regenerate the lockfile after patching so the cache key reflects the post-patch
    # devDependencies — aligning it with the key the build job computes from the artifact.
    - name: Apply OpenTok patch and regenerate lockfile
      if: inputs.target == 'opentok'
      shell: bash
      run: |
        git apply ./lib/js/opentok.patch
        # --prefix because this step also runs git apply from the repo root;
        # composite steps can't have two working-directory values.
        npm --prefix lib/js install --package-lock-only

    - name: Restore Node Modules
      uses: ./.github/actions/restore-node-modules
      with:
        target: ${{ inputs.target }}
