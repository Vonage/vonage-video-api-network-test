name: 'Test'
description: 'Validates credentials, writes private keys, and runs tests'
inputs:
  target:
    description: 'Target package'
    required: true
  vonage_private_key:
    description: 'Private key for Vonage'
    required: false
  test_application_id:
    description: 'Test application ID'
    required: false
  test_api_key:
    description: 'Test API key'
    required: false
  test_api_secret:
    description: 'Test API secret'
    required: false
runs:
  using: "composite"
  steps:
    - name: Create Vonage Private Key
      if: inputs.target == 'vonage'
      shell: bash
      working-directory: lib/js
      env:
        VONAGE_PRIVATE_KEY: ${{ inputs.vonage_private_key }}
      run: |
        if [ -z "$VONAGE_PRIVATE_KEY" ]; then
          echo "❌ vonage_private_key is empty or not set"
          exit 1
        fi
        echo "$VONAGE_PRIVATE_KEY" > private.key

    - name: Validate OpenTok Credentials
      if: inputs.target == 'opentok'
      shell: bash
      env:
        TEST_API_KEY: ${{ inputs.test_api_key }}
        TEST_API_SECRET: ${{ inputs.test_api_secret }}
      run: |
        if [ -z "$TEST_API_KEY" ] || [ -z "$TEST_API_SECRET" ]; then
          echo "❌ test_api_key and test_api_secret are required for opentok target"
          exit 1
        fi

    # TEST_APPLICATION_ID, TEST_API_KEY, and TEST_API_SECRET are used by both
    # vonage and opentok test suites. Vonage additionally requires the private key written above.
    - name: Run Tests
      shell: bash
      working-directory: lib/js
      env:
        TEST_APPLICATION_ID: ${{ inputs.test_application_id }}
        TEST_API_KEY: ${{ inputs.test_api_key }}
        TEST_API_SECRET: ${{ inputs.test_api_secret }}
      run: npm run test

    - name: Delete Private Key
      if: always() && inputs.target == 'vonage'
      shell: bash
      working-directory: lib/js
      run: rm -f private.key
