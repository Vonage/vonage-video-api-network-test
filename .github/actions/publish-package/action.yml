name: 'Publish Package'
description: 'Downloads a pre-built artifact and publishes it to the specified registry'
inputs:
  target:
    description: 'Target package (vonage or opentok) — determines which CI artifact to download and which scope to apply'
    required: true
  registry:
    description: 'NPM registry to publish to'
    required: true
  dry_run:
    description: 'Dry run mode — runs the publish command but nothing is pushed to the registry'
    required: false
    default: 'false'
  tag:
    description: 'Additional tag to append to the version and use as the dist-tag (e.g., alpha → 1.2.3-alpha). Leave empty to publish the version as-is with the "latest" dist-tag.'
    required: false
    default: ''
  node_version:
    description: 'Node.js version to use (e.g. 24.x)'
    required: true
  npm_token:
    description: 'NPM token for publishing to registry.npmjs.org — required when registry is npmjs.com'
    required: false
  github_packages_token:
    description: 'PAT with write:packages scope for publishing to GitHub Packages — required when registry is github.com'
    required: false
  github_token:
    description: 'GitHub token for downloading artifacts'
    required: true
  organization:
    description: 'NPM scope to apply before publishing — "vonage", "opentok", or "unscoped" for legacy unscoped packages. Leave empty to publish with the scope already in the tarball.'
    required: false
    default: ''
  run_id:
    description: 'CI workflow run ID to download the artifact from. Leave empty to use the latest successful run on the current branch.'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Resolve auth token
      shell: bash
      env:
        NPM_TOKEN: ${{ inputs.npm_token }}
        GH_PACKAGES_TOKEN: ${{ inputs.github_packages_token }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        # NODE_AUTH_TOKEN is read automatically by npm when publishing.
        if [ "$REGISTRY" == "github.com" ]; then
          if [ -z "$GH_PACKAGES_TOKEN" ]; then
            echo "❌ Error: github_packages_token is required when publishing to github.com"
            exit 1
          fi
          echo "NODE_AUTH_TOKEN=$GH_PACKAGES_TOKEN" >> "$GITHUB_ENV"
        else
          if [ -z "$NPM_TOKEN" ]; then
            echo "❌ Error: npm_token is required when publishing to npmjs.com"
            exit 1
          fi
          echo "NODE_AUTH_TOKEN=$NPM_TOKEN" >> "$GITHUB_ENV"
        fi

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}
        # Scope ensures the correct registry mapping in .npmrc for scoped packages on GitHub Packages.
        scope: ${{ inputs.organization != 'unscoped' && inputs.organization != '' && format('@{0}', inputs.organization) || '' }}
        # Defaults to GitHub Packages when registry is not npmjs.com.
        registry-url: ${{ inputs.registry == 'npmjs.com' && 'https://registry.npmjs.org' || 'https://npm.pkg.github.com/' }}

    - name: Clean publish directory
      shell: bash
      run: rm -rf lib/js && mkdir -p lib/js

    - name: Download Build Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        github_token: ${{ inputs.github_token }}
        workflow: post-merge-validation.yml
        run_id: ${{ inputs.run_id }}
        # When run_id is provided, branch is set to '' — dawidd6 treats an explicit empty
        # string the same as omitting the parameter (no branch filter applied).
        branch: ${{ inputs.run_id == '' && github.ref_name || '' }}
        name: ${{ inputs.target }}-package-tarball
        path: lib/js

    - name: Extract Tarball
      working-directory: lib/js
      shell: bash
      run: |
        mapfile -t TARBALLS < <(find . -maxdepth 1 -name '*.tgz')
        if [ "${#TARBALLS[@]}" -ne 1 ]; then
          echo "❌ Expected exactly 1 tarball, found ${#TARBALLS[@]}"
          exit 1
        fi
        TARBALL="${TARBALLS[0]}"
        # Extract, stripping the package/ prefix that npm pack adds
        tar -xzf "$TARBALL" --strip-components=1
        # Remove tarball to prevent npm from trying to publish the file itself
        rm "$TARBALL"

    - name: Strip publishConfig registry override
      working-directory: lib/js
      shell: bash
      run: |
        # publishConfig.registry in the tarball's package.json overrides setup-node's .npmrc.
        # Remove it so the registry configured by setup-node always takes effect.
        npm pkg delete publishConfig.registry 2>/dev/null || true

    - name: Apply Organization Scope
      if: inputs.organization != ''
      working-directory: lib/js
      shell: bash
      env:
        ORGANIZATION: ${{ inputs.organization }}
      run: |
        CURRENT_NAME=$(node -p "require('./package.json').name")
        # Strip scope prefix only if one is present, to avoid mangling unscoped names.
        if [[ "$CURRENT_NAME" == @*/* ]]; then
          BASE_NAME="${CURRENT_NAME#@*/}"
        else
          BASE_NAME="$CURRENT_NAME"
        fi
        if [ "$ORGANIZATION" == "unscoped" ]; then
          npm pkg set name="$BASE_NAME"
        else
          npm pkg set name="@${ORGANIZATION}/${BASE_NAME}"
        fi

    - name: Apply Pre-release Tag to Version
      if: inputs.tag != ''
      working-directory: lib/js
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
      run: |
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        PACKAGE_NAME=$(node -p "require('./package.json').name")

        ALL_VERSIONS=$(npm view "${PACKAGE_NAME}" versions --json 2>/dev/null || echo "[]")

        PRERELEASE_NUM=$(ALL_VERSIONS="$ALL_VERSIONS" BASE_VERSION="$CURRENT_VERSION" TAG_NAME="$TAG" node -e "
          const raw = JSON.parse(process.env.ALL_VERSIONS);
          const versions = Array.isArray(raw) ? raw : [raw];
          const prefix = process.env.BASE_VERSION + '-' + process.env.TAG_NAME + '.';
          const nums = versions
            .filter(v => v.startsWith(prefix))
            .map(v => parseInt(v.slice(prefix.length), 10))
            .filter(n => !isNaN(n));
          console.log(nums.length > 0 ? Math.max(...nums) + 1 : 1);
        ")

        npm pkg set version="${CURRENT_VERSION}-${TAG}.${PRERELEASE_NUM}"

    - name: Check if version already published
      working-directory: lib/js
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
      run: |
        PACKAGE_NAME=$(node -p "require('./package.json').name")
        PACKAGE_VERSION=$(node -p "require('./package.json').version")

        # .npmrc is already configured for the correct registry by Setup Node.
        PUBLISHED_VERSION=$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || echo "")

        if [ "$PUBLISHED_VERSION" == "$PACKAGE_VERSION" ]; then
          echo "❌ Error: Version $PACKAGE_VERSION is already published on $REGISTRY!"
          exit 1
        fi

    - name: Publish
      working-directory: lib/js
      shell: bash
      env:
        DRY_RUN: ${{ inputs.dry_run }}
        TAG: ${{ inputs.tag }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        PUBLISH_ARGS=(publish --access public)
        if [ "$DRY_RUN" == "true" ]; then
          PUBLISH_ARGS+=(--dry-run)
        fi
        if [ -n "$TAG" ]; then
          PUBLISH_ARGS+=(--tag "$TAG")
        fi

        echo "Publishing to $REGISTRY: npm ${PUBLISH_ARGS[*]}"
        npm "${PUBLISH_ARGS[@]}"
