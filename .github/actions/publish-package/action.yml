name: 'Publish Package'
description: 'Downloads a pre-built artifact and publishes it to the specified registry'
inputs:
  target:
    description: 'Target package (vonage or opentok)'
    required: true
  registry:
    description: 'Target registry (github.com or npmjs.com)'
    required: true
  dry_run:
    description: 'Dry run mode (true/false)'
    required: false
    default: 'false'
  github_token:
    description: 'GitHub token for downloading artifacts and GitHub Packages auth'
    required: true
  npm_token:
    description: 'NPM token for publishing to registry.npmjs.org (optional if only publishing to github)'
    required: false

runs:
  using: "composite"
  steps:
    # --- DYNAMIC NODE SETUP ---
    - name: Setup Node for GitHub Packages
      if: inputs.registry == 'github.com'
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        registry-url: 'https://npm.pkg.github.com/'

    - name: Setup Node for NPM Registry
      if: inputs.registry == 'npmjs.com'
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        registry-url: 'https://registry.npmjs.org/'

    - name: Download Build Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        github_token: ${{ inputs.github_token }}
        workflow: ci.yml
        branch: main
        name: build-artifacts-${{ inputs.target }}
        path: lib/js

    - name: Check if version already published
      working-directory: lib/js
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        NPM_TOKEN: ${{ inputs.npm_token }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        # Dynamically map the correct token based on the selected registry
        export NODE_AUTH_TOKEN=$([ "$REGISTRY" == "github.com" ] && echo "$GH_TOKEN" || echo "$NPM_TOKEN")

        PACKAGE_NAME=$(node -p "require('./package.json').name")
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        PUBLISHED_VERSION=$(npm view $PACKAGE_NAME@$PACKAGE_VERSION version 2>/dev/null || echo "")

        if [ "$PUBLISHED_VERSION" == "$PACKAGE_VERSION" ]; then
          echo "❌ Error: Version $PACKAGE_VERSION is already published on $REGISTRY!"
          exit 1
        fi

    - name: Publish Package
      working-directory: lib/js
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        NPM_TOKEN: ${{ inputs.npm_token }}
        REGISTRY: ${{ inputs.registry }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        # Dynamically map the correct token again
        export NODE_AUTH_TOKEN=$([ "$REGISTRY" == "github.com" ] && echo "$GH_TOKEN" || echo "$NPM_TOKEN")

        if [ "$DRY_RUN" == "true" ]; then
          echo "DRY RUN MODE - Publishing to $REGISTRY"
          npm publish --dry-run
        else
          echo "Publishing to $REGISTRY..."
          npm publish
        fi
