name: 'Publish Package'
description: 'Downloads a pre-built artifact and publishes it to GitHub Packages'
inputs:
  target:
    description: 'Target package (vonage or opentok)'
    required: true
  dry_run:
    description: 'Dry run mode (true/false)'
    required: false
    default: 'false'
  github_token:
    description: 'GitHub token for downloading artifacts and npm auth'
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        registry-url: 'https://npm.pkg.github.com/'

    - name: Download Build Artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        github_token: ${{ inputs.github_token }}
        workflow: ci.yml
        branch: main
        name: build-artifacts-${{ inputs.target }}
        path: lib/js

    - name: Check if version already published
      working-directory: lib/js
      shell: bash
      run: |
        # Version is already correct because it was checked out from main
        PACKAGE_NAME=$(node -p "require('./package.json').name")
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        PUBLISHED_VERSION=$(npm view $PACKAGE_NAME@$PACKAGE_VERSION version 2>/dev/null || echo "")

        if [ "$PUBLISHED_VERSION" == "$PACKAGE_VERSION" ]; then
          echo "❌ Error: Version $PACKAGE_VERSION is already published on GitHub Packages!"
          exit 1
        fi

    - name: Dry-run before publishing
      if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
      working-directory: lib/js
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.github_token }}
      run: |
        echo "DRY RUN MODE"
        npm publish --dry-run

    - name: Publish to GitHub Packages
      if: inputs.dry_run == 'false'
      working-directory: lib/js
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.github_token }}
      run: npm publish
