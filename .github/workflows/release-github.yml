name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which package do you want to release?'
        required: true
        type: choice
        options:
          - vonage
          - opentok
      version:
        description: 'Manual version bump (e.g., 1.2.0). Leave empty to use package.json.'
        required: false
        type: string
      dry_run:
        description: 'Dry run mode (test without publishing)'
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        target: [vonage, opentok]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup and Build
        uses: ./.github/actions/build-env
        with:
          target: ${{ matrix.target }}

      - name: Test
        uses: ./.github/actions/test
        with:
          target: ${{ matrix.target }}
          vonage_private_key: ${{ secrets.VONAGE_PRIVATE_KEY }}
          test_application_id: ${{ secrets.TEST_APPLICATION_ID }}
          test_api_key: ${{ secrets.TEST_API_KEY }}
          test_api_secret: ${{ secrets.TEST_API_SECRET }}

  release-vonage:
    needs: test
    if: github.event_name == 'push' || inputs.target == 'vonage'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/build-env
        with:
          target: 'vonage'
          run_build: 'false'
          registry_url: 'https://npm.pkg.github.com'

      - name: Set Package Version
        working-directory: lib/js
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            npm version $VERSION --no-git-tag-version
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.version }}" != "" ]]; then
            INPUT_VER="${{ inputs.version }}"
            VERSION="${INPUT_VER#v}"
            npm version $VERSION --no-git-tag-version
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build .npmrc file
        working-directory: lib/js
        run: |
          echo "always-auth=true" > .npmrc
          echo "registry=https://npm.pkg.github.com/" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Check if version already published
        working-directory: lib/js
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PUBLISHED_VERSION=$(npm view $PACKAGE_NAME@${{ env.PACKAGE_VERSION }} version 2>/dev/null || echo "")

          if [ "$PUBLISHED_VERSION" == "${{ env.PACKAGE_VERSION }}" ]; then
            echo "❌ Error: Version ${{ env.PACKAGE_VERSION }} is already published on GitHub Packages!"
            exit 1
          fi

      - name: Build package
        working-directory: lib/js
        run: npm run build

      - name: Dry-run before publishing
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        working-directory: lib/js
        run: |
          echo "DRY RUN MODE"
          npm publish --dry-run

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' || inputs.dry_run == false
        working-directory: lib/js
        run: npm publish

      - name: Verify publication
        if: github.event_name == 'push' || inputs.dry_run == false
        working-directory: lib/js
        run: |
          sleep 10
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          npm view $PACKAGE_NAME@${{ env.PACKAGE_VERSION }} version

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-package-dist-vonage
          path: lib/js/dist/

  release-opentok:
    needs: test
    if: github.event_name == 'push' || inputs.target == 'opentok'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/build-env
        with:
          target: 'opentok'
          run_build: 'false'
          registry_url: 'https://npm.pkg.github.com'

      - name: Set Package Version
        working-directory: lib/js
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            npm version $VERSION --no-git-tag-version
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.version }}" != "" ]]; then
            INPUT_VER="${{ inputs.version }}"
            VERSION="${INPUT_VER#v}"
            npm version $VERSION --no-git-tag-version
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build .npmrc file
        working-directory: lib/js
        run: |
          echo "always-auth=true" > .npmrc
          echo "registry=https://npm.pkg.github.com/" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Check if version already published
        working-directory: lib/js
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PUBLISHED_VERSION=$(npm view $PACKAGE_NAME@${{ env.PACKAGE_VERSION }} version 2>/dev/null || echo "")

          if [ "$PUBLISHED_VERSION" == "${{ env.PACKAGE_VERSION }}" ]; then
            echo "❌ Error: Version ${{ env.PACKAGE_VERSION }} is already published on GitHub Packages!"
            exit 1
          fi

      - name: Build package
        working-directory: lib/js
        run: npm run build

      - name: Dry-run before publishing
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        working-directory: lib/js
        run: |
          echo "DRY RUN MODE"
          npm publish --dry-run

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' || inputs.dry_run == false
        working-directory: lib/js
        run: npm publish

      - name: Verify publication
        if: github.event_name == 'push' || inputs.dry_run == false
        working-directory: lib/js
        run: |
          sleep 10
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          npm view $PACKAGE_NAME@${{ env.PACKAGE_VERSION }} version

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-package-dist-opentok
          path: lib/js/dist/
