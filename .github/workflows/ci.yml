name: Package

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        target: [vonage, opentok]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          target: ${{ matrix.target }}

      - name: Test
        uses: ./.github/actions/run-test
        with:
          target: ${{ matrix.target }}
          vonage_private_key: ${{ secrets.VONAGE_PRIVATE_KEY }}
          test_application_id: ${{ secrets.TEST_APPLICATION_ID }}
          test_api_key: ${{ secrets.TEST_API_KEY }}
          test_api_secret: ${{ secrets.TEST_API_SECRET }}

  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and Package Vonage
        uses: ./.github/actions/build-and-package-library
        with:
          target: 'vonage'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          bump_version: 'true'

      - name: Build and Package OpenTok
        uses: ./.github/actions/build-and-package-library
        with:
          target: 'opentok'
