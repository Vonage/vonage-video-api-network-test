name: Publish Package

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target package'
        required: true
        type: choice
        default: 'vonage'
        options:
          - 'vonage'
          - 'opentok'
      registry:
        description: 'NPM registry to publish to'
        required: true
        type: choice
        default: 'npmjs.com'
        options:
          - 'github.com'
          - 'npmjs.com'
      dry_run:
        description: 'Dry run mode (test without publishing)'
        required: true
        type: boolean
        default: true
      tag:
        description: 'Pre-release tag appended to the version and used as the dist-tag (e.g., alpha → 1.2.3-alpha). Leave empty to publish the version as-is with the "latest" dist-tag.'
        required: false
        type: string
        default: ''
      run_id:
        description: 'Numeric CI run ID to publish from (find it in the Actions tab URL). Leave empty to use the latest successful run on the current branch.'
        required: false
        type: string
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel: a publish mid-flight could leave the registry in an inconsistent state.

permissions: read-all

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Publish ${{ inputs.target }} to ${{ inputs.registry }}
    permissions:
      contents: write  # Required to create tags and GitHub Releases.
      packages: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # dry_run, tag, run_id, and github_token are shared across all three steps;
      # update all three if publish-package gains new shared inputs.
      - name: Publish Vonage Package
        if: inputs.target == 'vonage'
        uses: ./.github/actions/publish-package
        with:
          target: vonage
          registry: ${{ inputs.registry }}
          dry_run: ${{ inputs.dry_run }}
          tag: ${{ inputs.tag }}
          run_id: ${{ inputs.run_id }}
          organization: vonage
          github_token: ${{ secrets.GITHUB_TOKEN }}
          npm_token: ${{ secrets.NPM_TOKEN_VONAGE }}
          node_version: ${{ vars.NODE_VERSION }}
          # @vonage packages live in this repo's org, so the built-in GITHUB_TOKEN has write:packages.
          github_packages_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish OpenTok Package to GitHub
        if: inputs.target == 'opentok' && inputs.registry == 'github.com'
        uses: ./.github/actions/publish-package
        with:
          target: opentok
          registry: github.com
          dry_run: ${{ inputs.dry_run }}
          tag: ${{ inputs.tag }}
          run_id: ${{ inputs.run_id }}
          organization: opentok
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # @opentok packages live in a different GitHub org; GITHUB_TOKEN cannot publish
          # across org boundaries, so a PAT with write:packages on the opentok org is required.
          github_packages_token: ${{ secrets.NPM_TOKEN_OPENTOK_GITHUB }}
          node_version: ${{ vars.NODE_VERSION }}

      - name: Publish OpenTok Package to NPM
        if: inputs.target == 'opentok' && inputs.registry == 'npmjs.com'
        uses: ./.github/actions/publish-package
        with:
          target: opentok
          registry: npmjs.com
          dry_run: ${{ inputs.dry_run }}
          tag: ${{ inputs.tag }}
          run_id: ${{ inputs.run_id }}
          organization: unscoped
          github_token: ${{ secrets.GITHUB_TOKEN }}
          npm_token: ${{ secrets.NPM_TOKEN_OPENTOK }}
          node_version: ${{ vars.NODE_VERSION }}

      # Resolve the SHA of the CI run that produced the artifact so the Git tag and release
      # point to the exact source commit, not the workflow-dispatch ref (which may differ).
      - name: Resolve source commit SHA
        if: ${{ !inputs.dry_run }}
        id: source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          if [ -n "$RUN_ID" ]; then
            SHA=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID" --jq '.head_sha')
          else
            SHA=$(gh api "/repos/$GITHUB_REPOSITORY/actions/workflows/post-merge-validation.yml/runs?branch=$GITHUB_REF_NAME&status=success&per_page=1" --jq '.workflow_runs[0].head_sha')
          fi
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "❌ Could not resolve source commit SHA"
            exit 1
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./lib/js/package.json').version")
          TARGET="${{ inputs.target }}"
          TAG_NAME="${TARGET}/v${VERSION}"
          SOURCE_SHA="${{ steps.source.outputs.sha }}"

          # If this release already exists (e.g., same version published to a second registry),
          # skip silently rather than failing.
          if gh release view "$TAG_NAME" &>/dev/null; then
            echo "ℹ️  Release $TAG_NAME already exists — skipping."
            exit 0
          fi

          # Fetch all tags so we can find the previous one for accurate changelog scoping.
          git fetch --tags --quiet

          RELEASE_FLAGS=(
            --title "${TARGET^} v${VERSION}"
            --generate-notes
            --target "$SOURCE_SHA"
          )

          # Scope the auto-generated changelog to only PRs since the last release of this target.
          PREV_TAG=$(git tag -l "${TARGET}/v*" --sort=-version:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            RELEASE_FLAGS+=(--notes-start-tag "$PREV_TAG")
          fi

          # Mark pre-release versions (those built with a tag suffix, e.g. alpha) accordingly.
          if [ -n "${{ inputs.tag }}" ]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          gh release create "$TAG_NAME" "${RELEASE_FLAGS[@]}"
          echo "✅ Created release $TAG_NAME targeting $SOURCE_SHA"
