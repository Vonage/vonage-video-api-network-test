name: Post Merge Validation

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - 'release-*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel: package artifacts may be mid-upload.

permissions: read-all

jobs:
  test:
    if: github.event.pull_request.merged == true
    strategy:
      fail-fast: false
      matrix:
        target: [vonage, opentok]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          target: ${{ matrix.target }}
          node_version: ${{ vars.NODE_VERSION }}

      - name: Test
        uses: ./.github/actions/run-test
        with:
          target: ${{ matrix.target }}
          vonage_private_key: ${{ secrets.VONAGE_PRIVATE_KEY }}
          test_application_id: ${{ secrets.TEST_APPLICATION_ID }}
          test_api_key: ${{ secrets.TEST_API_KEY }}
          test_api_secret: ${{ secrets.TEST_API_SECRET }}

  package:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target: [vonage, opentok]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Package
        uses: ./.github/actions/build-and-package-library
        with:
          target: ${{ matrix.target }}
          node_version: ${{ vars.NODE_VERSION }}
