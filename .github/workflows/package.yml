name: Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Which package do you want to prepare?'
        required: true
        type: choice
        options:
          - vonage
          - opentok

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        target: [vonage, opentok]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        if: github.event_name == 'push' || inputs.target == matrix.target
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup and Build
        if: github.event_name == 'push' || inputs.target == matrix.target
        uses: ./.github/actions/build-env
        with:
          target: ${{ matrix.target }}

      - name: Test
        if: github.event_name == 'push' || inputs.target == matrix.target
        uses: ./.github/actions/test
        with:
          target: ${{ matrix.target }}
          vonage_private_key: ${{ secrets.VONAGE_PRIVATE_KEY }}
          test_application_id: ${{ secrets.TEST_APPLICATION_ID }}
          test_api_key: ${{ secrets.TEST_API_KEY }}
          test_api_secret: ${{ secrets.TEST_API_SECRET }}

  package-vonage:
    needs: test
    if: github.event_name == 'push' || inputs.target == 'vonage'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/build-env
        with:
          target: 'vonage'
          run_build: 'false'

      - name: Version Packages and Generate Changelog
        working-directory: lib/js
        run: |
          npx changeset version
          npm install --package-lock-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Version Bump
        working-directory: lib/js
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version bump [skip ci]" || echo "No changes to commit"

      - name: Build package
        working-directory: lib/js
        run: npm run build

      - name: Package and Upload
        uses: ./.github/actions/package
        with:
          target: 'vonage'

      - name: Push Version Bump
        working-directory: lib/js
        run: git push origin main --follow-tags || echo "No changes to push"

  package-opentok:
    needs: [test, package-vonage]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.package-vonage.result == 'success' || needs.package-vonage.result == 'skipped') &&
      (github.event_name == 'push' || inputs.target == 'opentok')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup and Build
        uses: ./.github/actions/build-env
        with:
          target: 'opentok'

      - name: Package and Upload
        uses: ./.github/actions/package
        with:
          target: 'opentok'
