name: Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Which package do you want to prepare?'
        required: true
        type: choice
        options:
          - vonage
          - opentok

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        target: [vonage, opentok]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.target == matrix.target
    defaults:
      run:
        working-directory: lib/js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: lib/js/node_modules
          key: ${{ runner.os }}-node-${{ matrix.target }}-${{ hashFiles('lib/js/package-lock.json') }}

      - name: Apply OpenTok patch
        if: matrix.target == 'opentok'
        working-directory: .
        run: git apply ./lib/js/opentok.patch

      - name: Install dependencies (Vonage)
        if: matrix.target == 'vonage' && steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install dependencies (OpenTok)
        if: matrix.target == 'opentok' && steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install

      - name: Build package
        run: npm run build

      - name: Create private key file for Vonage testing
        if: matrix.target == 'vonage'
        run: echo "${{ secrets.VONAGE_PRIVATE_KEY }}" > private.key

      - name: Testing
        run: npm run test
        env:
          TEST_APPLICATION_ID: ${{ secrets.TEST_APPLICATION_ID }}
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}

  package-vonage:
    needs: test
    if: github.event_name == 'push' || inputs.target == 'vonage'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lib/js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: lib/js/node_modules
          key: ${{ runner.os }}-node-vonage-${{ hashFiles('lib/js/package-lock.json') }}

      - name: Install dependencies (Vonage)
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Version Packages and Generate Changelog
        run: |
          npx changeset version
          npm install --package-lock-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version bump [skip ci]" || echo "No changes to commit"

      - name: Build package
        run: npm run build

      - name: Pack Vonage
        run: npm pack

      - name: Upload Vonage Tarball
        uses: actions/upload-artifact@v4
        with:
          name: vonage-package-tarball
          path: lib/js/*.tgz
          retention-days: 7

      - name: Push Version Bump
        run: git push origin main --follow-tags || echo "No changes to push"

  package-opentok:
    needs: [test, package-vonage]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.package-vonage.result == 'success' || needs.package-vonage.result == 'skipped') &&
      (github.event_name == 'push' || inputs.target == 'opentok')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lib/js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: lib/js/node_modules
          key: ${{ runner.os }}-node-opentok-${{ hashFiles('lib/js/package-lock.json') }}

      - name: Apply OpenTok patch
        working-directory: .
        run: git apply ./lib/js/opentok.patch

      - name: Install dependencies (OpenTok)
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install

      - name: Build package
        run: npm run build

      - name: Pack OpenTok
        run: npm pack

      - name: Upload OpenTok Tarball
        uses: actions/upload-artifact@v4
        with:
          name: opentok-package-tarball
          path: lib/js/*.tgz
          retention-days: 7
