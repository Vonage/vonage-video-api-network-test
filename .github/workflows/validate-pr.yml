name: Validate PR

on:
  pull_request:
    branches:
      - '**'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: [vonage, opentok]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup and Build
        uses: ./.github/actions/build-env
        with:
          target: ${{ matrix.target }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.target }}
          path: dist
          retention-days: 1

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        target: [vonage, opentok]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/build-env
        with:
          target: ${{ matrix.target }}
          run_build: 'false'

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ matrix.target }}
          path: dist

      - name: Test
        uses: ./.github/actions/test
        with:
          target: ${{ matrix.target }}
          vonage_private_key: ${{ secrets.VONAGE_PRIVATE_KEY }}
          test_application_id: ${{ secrets.TEST_APPLICATION_ID }}
          test_api_key: ${{ secrets.TEST_API_KEY }}
          test_api_secret: ${{ secrets.TEST_API_SECRET }}

  lint:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target: [vonage, opentok]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/build-env
        with:
          target: ${{ matrix.target }}
          run_build: 'false'

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ matrix.target }}
          path: dist

      - name: Linting
        working-directory: lib/js
        run: npm run tslint
