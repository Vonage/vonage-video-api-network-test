name: Publish Package

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target package'
        required: true
        type: choice
        default: 'vonage'
        options:
          - 'vonage'
          - 'opentok'
      registry:
        description: 'NPM Registry to publish to.'
        required: true
        type: choice
        default: 'npmjs.com'
        options:
          - 'github.com'
          - 'npmjs.com'
      dry_run:
        description: 'Dry run mode (test without publishing)'
        required: true
        type: boolean
        default: true
      tag:
        description: 'NPM distribution tag (e.g., alpha, beta — leave empty to publish as latest)'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - 'alpha'
          - 'beta'
      allow_replace:
        description: 'Replace existing package version if already published'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish ${{ inputs.target }} to ${{ inputs.registry }}
    permissions:
      contents: write
      packages: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish Vonage Package
        if: inputs.target == 'vonage'
        uses: ./.github/actions/publish-package
        with:
          target: ${{ inputs.target }}
          registry: ${{ inputs.registry }}
          dry_run: ${{ inputs.dry_run }}
          tag: ${{ inputs.tag }}
          allow_replace: ${{ inputs.allow_replace }}
          organization: vonage
          github_token: ${{ secrets.GITHUB_TOKEN }}
          npm_token: ${{ secrets.NPM_TOKEN_VONAGE }}
          github_packages_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish OpenTok Package to GitHub
        if: inputs.target == 'opentok' && inputs.registry == 'github.com'
        uses: ./.github/actions/publish-package
        with:
          target: ${{ inputs.target }}
          registry: ${{ inputs.registry }}
          dry_run: ${{ inputs.dry_run }}
          tag: ${{ inputs.tag }}
          allow_replace: ${{ inputs.allow_replace }}
          organization: opentok
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_packages_token: ${{ secrets.NPM_TOKEN_OPENTOK_GITHUB }}

      - name: Publish OpenTok Package to NPM
        if: inputs.target == 'opentok' && inputs.registry == 'npmjs.com'
        uses: ./.github/actions/publish-package
        with:
          target: ${{ inputs.target }}
          registry: ${{ inputs.registry }}
          dry_run: ${{ inputs.dry_run }}
          tag: ${{ inputs.tag }}
          allow_replace: ${{ inputs.allow_replace }}
          organization: none
          github_token: ${{ secrets.GITHUB_TOKEN }}
          npm_token: ${{ secrets.NPM_TOKEN_OPENTOK }}
